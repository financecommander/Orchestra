name: "Bug Report (Orchestra Issue)"
description: "Report a bug or issue with Orchestra workflows"
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: "A clear and concise description of the bug."
      placeholder: "Describe the bug..."
    validations:
      required: true

  - type: input
    id: workflow-name
    attributes:
      label: Workflow Name
      description: "Name of the affected workflow, if applicable."
      placeholder: "e.g., constitutional_tender_kyc"
    validations:
      required: false

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: "Steps to reproduce the behavior."
      placeholder: |
        1. Run workflow '...'
        2. Set parameter '...'
        3. Observe error at step '...'
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: "What you expected to happen."
      placeholder: "Describe the expected behavior..."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: "What actually happened."
      placeholder: "Describe the actual behavior..."
    validations:
      required: true

  - type: textarea
    id: workflow-state-snapshot
    attributes:
      label: Workflow State Snapshot
      description: "Upload a file or paste the workflow state as JSON."
      placeholder: |
        {
          "workflow_id": "...",
          "state": "...",
          "timestamp": "..."
        }
      render: json
    validations:
      required: false

  - type: textarea
    id: error-logs
    attributes:
      label: Error Logs
      description: "Paste any relevant error logs or stack traces."
      placeholder: "Paste error logs here..."
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Provide details about your environment."
      placeholder: |
        - OS: [e.g., Ubuntu 22.04]
        - Python version: [e.g., 3.11]
        - Orchestra version: [e.g., 0.1.0]
    validations:
      required: true
